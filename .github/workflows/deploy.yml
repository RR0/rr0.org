name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so that git-restore-mtime can restore each file's commit date,
          # allowing the build to diff against the cached out/ and only process changes.
          fetch-depth: 0

      - name: Restore file modification times
        uses: chetan/git-restore-mtime-action@v2

      - name: Restore out/ cache (incremental build)
        uses: actions/cache@v4
        with:
          path: out
          key: out-${{ github.sha }}
          restore-keys: |
            out-

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      - name: Deploy to Netlify (production)
        run: npx netlify deploy --prod --dir out --site 89e010f5-aeca-4ea8-ba90-828553499998
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
