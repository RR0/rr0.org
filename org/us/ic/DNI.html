<title>DNI</title>
<!--#include virtual="/header-end.html" -->
<p>En <time>2004</time> <i lang="en">Director of National Intelligence</i> remplace le <a href="DCI.html">DCI</a> à la
  tête de l'<a href=".">IC</a>.</p>
<p>Le bureau du DNI est l'<abbr title="Office of Director of National Intelligence">ODNI</abbr>.</p>
<p>À partir du <time>2026-05-22</time>, l'ODNI contribue aux tranches interagences du programme de déclassification <a
  href="/org/us/dod/PURSUE.html"><i lang="en">PURSUE</i></a> sur les <a href="/science/crypto/ufo/PAN.html">PANs</a>.
</p>
