<title>SU(2)</title>
<!--#include virtual="/header-end.html" -->
<p>Le <i lang="en">Special Unitary group 2</i> ou <a href="..">groupe Spécial Unitaire</a> 2.</p>
<section>
  <h2>Exemples</h2>
  <p>En <a href="/science/discipline/hard/nature/matter/physics/quantum/particles">physique des particules</a>, SU(2)
    est le groupe associé à l'<b>interaction faible</b> ainsi qu'au <b>spin</b> et à l'<b>isospin</b> ("isospin
    faible").</p>
</section>
