<title>SU(3)</title>
<!--#include virtual="/header-end.html" -->
<p>Le <i lang="en">Special Unitary group 3</i> ou <a href="..">groupe Spécial Unitaire</a> 3.</p>
<section>
  <h2>Exemples</h2>
  <p>En <a href="/science/discipline/hard/nature/matter/physics/quantum/particles">physique des particules</a>, SU(3)
    est le groupe associé à l'<b>interaction forte</b> ainsi qu'au <b>confinement</b> (les quarks ne sont jamais isolés)
    et à la <b>liberté asymptotique</b> (interaction faible à haute énergie).</p>
</section>
