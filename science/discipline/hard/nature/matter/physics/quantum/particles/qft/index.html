<title>QFT</title>
<!--#include virtual="/header-end.html" -->
<p>La <abbr title="Quantum Field Theory">QFT</abbr>, ou Théorie Quantique des Champs, combine :</p>
<ul>
  <li>la <a href="../../..">MQ</a></li>
  <li>la <a href="../../../relativ/rr">RR</a></li>
</ul>
<p>Elle décrit les particules comme des <b>excitations de champs</b> (électron = excitation du champ électronique, etc.)
  et fournit les outils mathématiques (opérateurs, champs, lagrangiens, symétries, renormalisation...).</p>
