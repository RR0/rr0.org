<title>QCD</title>
<!--#include virtual="/header-end.html" -->
<p>La <i lang="en" title="Quantum Chromo-Dynamics">QCD</i>, ou Chromodynamique quantique, est la <a href="..">QFT</a>
  appliquée à l'interaction forte.</p>
<p>Elle décrit :</p>
<ul>
  <li>les quarks</li>
  <li>les gluons</li>
</ul>
<p>Elle utilise le groupe de symétrie <a href="/science/discipline/hard/formal/math/set/group/u/su/3">SU(3)</a>.</p>
